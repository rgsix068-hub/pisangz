<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Pisang Hero - Updated</title>
    <style>
        :root {
            --primary: #F4C430; 
            --secondary: #6B4226; 
            --bg: #f9f9f9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg); color: #333; }
        header { background-color: var(--primary); color: var(--secondary); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 24px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; }
        .tab-btn { background: white; border: 2px solid var(--secondary); color: var(--secondary); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--secondary); color: white; }
        
        .container { display: flex; padding: 20px; gap: 20px; height: calc(100vh - 100px); box-sizing: border-box; }
        
        .menu-section { flex: 2; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow-y: auto; }
        .category-title { color: var(--secondary); border-bottom: 2px solid var(--primary); padding-bottom: 5px; margin-top: 0; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .menu-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; background: #fff; }
        .menu-card:hover { border-color: var(--primary); box-shadow: 0 4px 8px rgba(0,0,0,0.1); transform: translateY(-2px); }
        .menu-name { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .menu-price { color: #27ae60; font-weight: bold; }

        .cart-section { flex: 1; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 20px; border-bottom: 2px dashed #ddd; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; }
        .cart-item-controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { background: #eee; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .cart-total { font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn-beli { background: var(--secondary); color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-beli:hover { background: #50311c; }

        #rekapan { display: none; width: 100%; background: white; padding: 20px; border-radius: 10px; }
        .rekapan-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 15px; margin-bottom: 20px; }
        .rekapan-controls { display: flex; gap: 15px; align-items: center; }
        .filter-select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; font-weight: bold; color: var(--secondary); }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: var(--primary); color: var(--secondary); }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 30px; border-radius: 10px; text-align: center; width: 350px; }
        .modal h3 { margin-top: 0; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 10px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .btn-cash { background: #27ae60; color: white; }
        .btn-qris { background: #2980b9; color: white; }
        .btn-yes { background: #27ae60; color: white; }
        .btn-no { background: #e74c3c; color: white; }
        
        .cash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <div>🍌 Pisang Hero POS</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('kasir')">Menu Kasir</button>
            <button class="tab-btn" onclick="switchTab('rekapan')">Rekapan Penjualan</button>
        </div>
    </header>

    <div class="container" id="kasir">
        <div class="menu-section" id="menu-container"></div>
        <div class="cart-section">
            <h2 style="margin-top:0; color: var(--secondary);">Pesanan Saat Ini</h2>
            <div class="cart-items" id="cart-items"></div>
            <div class="cart-total">
                <span>Total:</span>
                <span id="total-price">Rp 0</span>
            </div>
            <button class="btn-beli" onclick="openPaymentModal()">PROSES BELI</button>
        </div>
    </div>

    <div class="container" id="rekapan">
        <div class="rekapan-header">
            <div>
                <h2 style="color: var(--secondary); margin-top: 0;">Rekapan Penjualan</h2>
                <div style="font-size: 20px; font-weight: bold;">
                    Total Pendapatan: <span id="total-revenue" style="color: #27ae60;">Rp 0</span>
                </div>
            </div>
            <div class="rekapan-controls">
                <div>
                    <label for="filter-tanggal" style="font-weight: bold; color: var(--secondary);">Filter Tanggal:</label>
                    <select id="filter-tanggal" class="filter-select" onchange="renderRekapan()"></select>
                </div>
                <button class="modal-btn btn-no" style="padding: 10px 15px;" onclick="clearHistory()">🗑️ Hapus Riwayat</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Detail Pesanan</th>
                    <th>Total Pembayaran</th>
                    <th>Metode</th>
                </tr>
            </thead>
            <tbody id="rekapan-body"></tbody>
        </table>
    </div>

    <div class="modal-overlay" id="payment-modal">
        <div class="modal">
            <h3 id="modal-title">Pilih Metode Pembayaran</h3>
            <p style="font-size: 24px; font-weight: bold; margin: 10px 0;" id="modal-total"></p>
            
            <div class="modal-btns" id="step-method">
                <button class="modal-btn btn-cash" onclick="promptCash()">CASH</button>
                <button class="modal-btn btn-qris" onclick="promptQris()">QRIS</button>
                <button class="modal-btn" style="background: #ccc;" onclick="closeModal()">Batal</button>
            </div>
            
            <div id="step-qris" style="display: none;">
                <p style="color: #e74c3c; font-weight: bold;">Apakah customer sudah bayar via QRIS?</p>
                <div class="modal-btns">
                    <button class="modal-btn btn-yes" onclick="processPayment('QRIS')">Sudah</button>
                    <button class="modal-btn btn-no" onclick="closeModal()">Belum</button>
                </div>
            </div>

            <div id="step-cash" style="display: none;">
                <p style="color: var(--secondary); font-weight: bold;">Pilih Uang Diterima:</p>
                <div class="cash-grid">
                    <button class="modal-btn btn-cash" onclick="payWithCash('pas')">Uang Pas</button>
                    <button class="modal-btn btn-cash" onclick="payWithCash(20000)">Rp 20.000</button>
                    <button class="modal-btn btn-cash" onclick="payWithCash(50000)">Rp 50.000</button>
                    <button class="modal-btn btn-cash" onclick="payWithCash(100000)">Rp 100.000</button>
                </div>
                <div class="modal-btns" style="margin-top: 15px;">
                    <button class="modal-btn btn-no" onclick="closeModal()">Batal</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const menuItems = [
        { id: 'm1', name: 'Matcha', price: 10000, category: 'Minuman' },
        { id: 'm2', name: 'Cokelat', price: 10000, category: 'Minuman' },
        
        { id: 'f1', name: 'Keju Polos', price: 12000, category: 'Makanan' },
        { id: 'f2', name: 'Glaze Coklat', price: 15000, category: 'Makanan' },
        { id: 'f3', name: 'Glaze Taro', price: 15000, category: 'Makanan' }, 
        { id: 'f4', name: 'Glaze Green Tea (Polos)', price: 15000, category: 'Makanan' },
        { id: 'f5', name: 'Glaze Tiramisu', price: 15000, category: 'Makanan' },
        
        { id: 's1', name: 'Original', price: 10000, category: 'Signature Menu' },
        { id: 's2', name: 'Meses', price: 12000, category: 'Signature Menu' },
        { id: 's3', name: 'Keju Meses', price: 14000, category: 'Signature Menu' },
        { id: 's4', name: 'Glaze Vanilla', price: 15000, category: 'Signature Menu' },
        { id: 's5', name: 'Glaze Cappuccino', price: 15000, category: 'Signature Menu' },
        { id: 's7', name: 'Keju Taro', price: 16000, category: 'Signature Menu' },
        { id: 's9', name: 'Keju Cappuccino', price: 16000, category: 'Signature Menu' },
        { id: 's10', name: 'Keju Green Tea', price: 16000, category: 'Signature Menu' },
        { id: 's11', name: 'Coklat Kacang', price: 16000, category: 'Signature Menu' },
        { id: 's12', name: 'Coklat Keju', price: 16000, category: 'Signature Menu' },
        { id: 's13', name: 'Tiramisu Oreo', price: 16000, category: 'Signature Menu' },
        { id: 's14', name: 'Keju Vanilla', price: 16000, category: 'Signature Menu' },
        
        { id: 'c1', name: 'Keju Choco Crunchy', price: 17000, category: 'Chruncy Series' },
        { id: 'c2', name: 'Keju Tiramisu Crunchy', price: 17000, category: 'Chruncy Series' },
        { id: 'c3', name: 'Keju Green Tea Crunchy', price: 17000, category: 'Chruncy Series' },
        
        { id: 'mt1', name: 'Keju Mix 2 Toping', price: 17000, category: 'Must Try' },
        { id: 'mt2', name: 'Keju Mix 2 Glaze', price: 17000, category: 'Must Try' },
        { id: 'mt3', name: 'Keju Mix 3 Topping', price: 18000, category: 'Must Try' },
        { id: 'mt4', name: 'Keju Mix 3 Glaze', price: 18000, category: 'Must Try' },

        { id: 't1', name: 'Topping Keju', price: 1000, category: 'Extra Topping' },
        { id: 't2', name: 'Topping Oreo', price: 1000, category: 'Extra Topping' },
        { id: 't3', name: 'Topping Mesis', price: 1000, category: 'Extra Topping' }
    ];

    let cart = [];
    let transactions = JSON.parse(localStorage.getItem('pisangHeroTransactions')) || [];
    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(angka);

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';
        const categories = [...new Set(menuItems.map(item => item.category))];
        categories.forEach(cat => {
            container.innerHTML += `<h3 class="category-title">${cat}</h3>`;
            const grid = document.createElement('div');
            grid.className = 'menu-grid';
            menuItems.filter(item => item.category === cat).forEach(item => {
                grid.innerHTML += `
                    <div class="menu-card" onclick="addToCart('${item.id}')">
                        <div class="menu-name">${item.name}</div>
                        <div class="menu-price">${formatRp(item.price)}</div>
                    </div>
                `;
            });
            container.appendChild(grid);
        });
    }

    function addToCart(id) {
        const item = menuItems.find(m => m.id === id);
        const existing = cart.find(c => c.id === id);
        if (existing) { existing.qty++; } else { cart.push({ ...item, qty: 1 }); }
        updateCartUI();
    }

    function updateQty(id, delta) {
        const item = cart.find(c => c.id === id);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) { cart = cart.filter(c => c.id !== id); }
        }
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items');
        container.innerHTML = '';
        let total = 0;
        cart.forEach(item => {
            total += (item.price * item.qty);
            container.innerHTML += `
                <div class="cart-item">
                    <div style="flex:1"><strong>${item.name}</strong><br><span style="color:#666;">${formatRp(item.price)}</span></div>
                    <div class="cart-item-controls">
                        <button class="btn-qty" onclick="updateQty('${item.id}', -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="btn-qty" onclick="updateQty('${item.id}', 1)">+</button>
                    </div>
                </div>`;
        });
        document.getElementById('total-price').innerText = formatRp(total);
    }

    function getTotal() { return cart.reduce((sum, item) => sum + (item.price * item.qty), 0); }

    function openPaymentModal() {
        if (cart.length === 0) { alert("Keranjang masih kosong!"); return; }
        document.getElementById('modal-total').innerText = formatRp(getTotal());
        document.getElementById('step-method').style.display = 'flex';
        document.getElementById('step-qris').style.display = 'none';
        document.getElementById('step-cash').style.display = 'none';
        document.getElementById('modal-title').innerText = "Pilih Metode Pembayaran";
        document.getElementById('payment-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('payment-modal').style.display = 'none'; }

    function promptQris() {
        document.getElementById('step-method').style.display = 'none';
        document.getElementById('step-qris').style.display = 'block';
        document.getElementById('modal-title').innerText = "Konfirmasi QRIS";
    }

    function promptCash() {
        document.getElementById('step-method').style.display = 'none';
        document.getElementById('step-cash').style.display = 'block';
        document.getElementById('modal-title').innerText = "Pembayaran Tunai";
    }

    function payWithCash(nominal) {
        const total = getTotal();
        let uangDiterima = nominal === 'pas' ? total : nominal;

        if (uangDiterima < total) {
            alert(`Peringatan: Uang kurang! Total belanja adalah ${formatRp(total)}`);
            return;
        }

        const kembalian = uangDiterima - total;
        processPayment('CASH', kembalian);
    }

    function processPayment(method, kembalian = 0) {
        const total = getTotal();
        const now = new Date();
        const dateStr = now.toLocaleDateString('id-ID') + ' ' + now.toLocaleTimeString('id-ID');
        const summary = cart.map(item => `${item.qty}x ${item.name}`).join('<br>');
        
        transactions.push({ date: dateStr, items: summary, total: total, method: method });
        localStorage.setItem('pisangHeroTransactions', JSON.stringify(transactions));
        
        let pesanSukses = `✅ Pesanan Selesai!\nPembayaran via ${method} berhasil.`;
        if (method === 'CASH') {
            pesanSukses += `\n\n------------------------\nKEMBALIAN: ${formatRp(kembalian)}\n------------------------`;
        }
        
        alert(pesanSukses);
        
        cart = []; 
        updateCartUI(); 
        closeModal(); 
        renderRekapan();
    }

    // --- FUNGSI REKAPAN BARU: Filter Tanggal ---
    function renderRekapan() {
        const tbody = document.getElementById('rekapan-body');
        const selectTanggal = document.getElementById('filter-tanggal');
        
        // 1. Ambil semua tanggal unik dari transaksi (misal: "15/10/2023")
        const uniqueDates = [...new Set(transactions.map(trx => trx.date.split(' ')[0]))];
        
        // 2. Simpan pilihan saat ini agar dropdown tidak reset ke awal
        const currentSelection = selectTanggal.value;
        
        // 3. Update isi dropdown
        selectTanggal.innerHTML = '<option value="semua">Semua Tanggal</option>';
        uniqueDates.forEach(date => {
            const isSelected = (date === currentSelection) ? 'selected' : '';
            selectTanggal.innerHTML += `<option value="${date}" ${isSelected}>${date}</option>`;
        });

        // 4. Filter transaksi berdasarkan tanggal yang dipilih
        const selectedDate = selectTanggal.value;
        let filteredTransactions = transactions;
        
        if (selectedDate && selectedDate !== 'semua') {
            // Saring transaksi yang tanggalnya diawali dengan tanggal yang dipilih
            filteredTransactions = transactions.filter(trx => trx.date.startsWith(selectedDate));
        }

        // 5. Render ke tabel
        tbody.innerHTML = '';
        let totalRev = 0;
        
        [...filteredTransactions].reverse().forEach(trx => {
            totalRev += trx.total;
            tbody.innerHTML += `
                <tr>
                    <td>${trx.date}</td>
                    <td>${trx.items}</td>
                    <td>${formatRp(trx.total)}</td>
                    <td><strong>${trx.method}</strong></td>
                </tr>`;
        });
        
        document.getElementById('total-revenue').innerText = formatRp(totalRev);
    }

    // --- FUNGSI BARU: Hapus Riwayat ---
    function clearHistory() {
        if (transactions.length === 0) {
            alert("Riwayat penjualan sudah kosong.");
            return;
        }
        
        const konfirmasi = confirm("⚠️ PERINGATAN!\nApakah Anda yakin ingin menghapus SEMUA riwayat penjualan?\nData yang dihapus tidak dapat dikembalikan.");
        
        if (konfirmasi) {
            transactions = []; // Kosongkan array
            localStorage.removeItem('pisangHeroTransactions'); // Hapus dari memori browser
            renderRekapan(); // Render ulang tabel (akan jadi kosong)
            alert("✅ Seluruh riwayat penjualan berhasil dihapus.");
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(event) event.target.classList.add('active');
        document.getElementById('kasir').style.display = tabId === 'kasir' ? 'flex' : 'none';
        document.getElementById('rekapan').style.display = tabId === 'rekapan' ? 'block' : 'none';
        if(tabId === 'rekapan') renderRekapan();
    }

    renderMenu();
    renderRekapan();
</script>
</body>
</html>
